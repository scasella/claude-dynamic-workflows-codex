name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Zero dependencies — no install step. Every suite is offline (no Codex, no
      # network): unit checks, viewer robustness across run shapes, the no-reload
      # live update channel, and the ASCII map renderer — all in a fake DOM.
      - name: Offline unit checks
        run: node runner/test/offline.js
      - name: Session driver (chaos + warm resume)
        run: node runner/test/codex-session.test.js
      - name: Run-viewer robustness (all shapes)
        run: node runner/test/view-run.test.js
      - name: Run-viewer live updates (no-reload sidecar channel)
        run: node runner/test/view-run.live.test.js
      - name: ASCII map renderer
        run: node runner/test/map-run.test.js
      - name: Run-summary report (cost / performance / reliability)
        run: node runner/test/summarize-run.test.js
      - name: GoalLint template (plan-mode smoke)
        run: node runner/test/goal-lint.plan.test.js
      - name: ClaimCheck template (plan-mode smoke)
        run: node runner/test/claim-check.plan.test.js
      - name: Interactive cockpit channel (serve)
        run: node runner/test/serve.test.js
      - name: Fleet supervision (status / answer / supervisor loop)
        run: node runner/test/fleet.test.js
